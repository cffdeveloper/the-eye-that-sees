<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <script>
      (function () {
        try {
          var d = document.documentElement;
          d.classList.remove("dark", "light");
          var t = localStorage.getItem("maverick-ui-theme");
          if (t === "dark") d.classList.add("dark");
          else d.classList.add("light");
        } catch (e) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinitygap — Know Where Money Moves Before Everyone Else</title>
    <meta name="description" content="AI intelligence agent that tracks 20+ industries, maps money flows, surfaces hidden gaps & opportunities. Investment-grade research delivered 24/7." />

    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Infinitygap — Know Where Money Moves Before Everyone Else" />
    <meta property="og:description" content="AI intelligence agent tracking 20+ industries, 70+ money flows. Surfaces hidden business gaps, research angles & cross-industry opportunities. Not scattered headlines — structured, actionable intel." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://infinitygap.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Infinitygap — AI-Powered Market Intelligence Platform" />
    <meta property="og:url" content="https://infinitygap.onrender.com/" />
    <meta property="og:site_name" content="Infinitygap" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Infinitygap — Know Where Money Moves Before Everyone Else" />
    <meta name="twitter:description" content="AI intelligence agent tracking 20+ industries & 70+ money flows. Surfaces hidden gaps, research angles & cross-industry opportunities 24/7." />
    <meta name="twitter:image" content="https://infinitygap.onrender.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://infinitygap.onrender.com/" />

    <!-- Google Search Console: set VITE_GOOGLE_SITE_VERIFICATION or GOOGLE_SITE_VERIFICATION at build time (see .env.example). vite.config injects the meta tag. -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
